<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SajuPlanner - Reset Password</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #6B46C1 0%, #4C1D95 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    .logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .logo-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #7C3AED, #6B46C1);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }
    .logo-icon svg { width: 32px; height: 32px; fill: white; }
    .logo h1 {
      font-size: 22px;
      font-weight: 800;
      color: #1a1a2e;
    }
    .logo p {
      font-size: 14px;
      color: #6b7280;
      margin-top: 8px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      border-color: #7C3AED;
    }
    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #7C3AED, #6B46C1);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 8px;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .message {
      text-align: center;
      padding: 14px;
      border-radius: 12px;
      font-size: 14px;
      margin-top: 16px;
      display: none;
    }
    .message.success {
      display: block;
      background: #ecfdf5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }
    .message.error {
      display: block;
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }
    .hint {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 4px;
    }
    .success-view { text-align: center; }
    .success-view .check {
      width: 60px;
      height: 60px;
      background: #ecfdf5;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }
    .success-view .check svg { width: 32px; height: 32px; stroke: #059669; }
    .success-view h2 { font-size: 20px; color: #1a1a2e; margin-bottom: 8px; }
    .success-view p { font-size: 14px; color: #6b7280; line-height: 1.6; }
    .error-view { text-align: center; }
    .error-view h2 { font-size: 20px; color: #991b1b; margin-bottom: 8px; }
    .error-view p { font-size: 14px; color: #6b7280; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
      </div>
      <h1>SajuPlanner</h1>
    </div>

    <!-- Form View -->
    <div id="formView">
      <p id="description" style="text-align:center;font-size:14px;color:#6b7280;margin-bottom:24px;"></p>
      <form id="resetForm" onsubmit="handleSubmit(event)">
        <div class="form-group">
          <label id="labelNew"></label>
          <input type="password" id="newPassword" minlength="8" required>
          <div class="hint" id="hintText"></div>
        </div>
        <div class="form-group">
          <label id="labelConfirm"></label>
          <input type="password" id="confirmPassword" minlength="8" required>
        </div>
        <button type="submit" class="btn" id="submitBtn"></button>
      </form>
      <div id="messageBox" class="message"></div>
    </div>

    <!-- Success View -->
    <div id="successView" style="display:none;" class="success-view">
      <div class="check">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2 id="successTitle"></h2>
      <p id="successDesc"></p>
    </div>

    <!-- Error View (invalid link) -->
    <div id="errorView" style="display:none;" class="error-view">
      <h2 id="errorTitle"></h2>
      <p id="errorDesc"></p>
    </div>
  </div>

  <script>
    const APPWRITE_ENDPOINT = 'https://api.sajuplanner.com/v1';
    const PROJECT_ID = 'saju-planner';

    // URL 파라미터 파싱
    const params = new URLSearchParams(window.location.search);
    const userId = params.get('userId');
    const secret = params.get('secret');

    // 다국어 텍스트
    const lang = (navigator.language || 'en').slice(0, 2);
    const texts = {
      ko: {
        desc: '새 비밀번호를 입력해주세요.',
        newPw: '새 비밀번호',
        confirmPw: '비밀번호 확인',
        hint: '8자 이상 입력해주세요',
        submit: '비밀번호 변경',
        mismatch: '비밀번호가 일치하지 않습니다.',
        successTitle: '비밀번호가 변경되었습니다',
        successDesc: '앱으로 돌아가서 새 비밀번호로 로그인해주세요.',
        errorTitle: '잘못된 링크입니다',
        errorDesc: '비밀번호 재설정 링크가 유효하지 않거나 만료되었습니다.\n앱에서 다시 요청해주세요.',
        fail: '비밀번호 변경에 실패했습니다. 다시 시도해주세요.',
        changing: '변경 중...',
      },
      en: {
        desc: 'Enter your new password.',
        newPw: 'New Password',
        confirmPw: 'Confirm Password',
        hint: 'At least 8 characters',
        submit: 'Reset Password',
        mismatch: 'Passwords do not match.',
        successTitle: 'Password Changed',
        successDesc: 'Go back to the app and log in with your new password.',
        errorTitle: 'Invalid Link',
        errorDesc: 'This password reset link is invalid or expired.\nPlease request a new one from the app.',
        fail: 'Failed to reset password. Please try again.',
        changing: 'Changing...',
      },
      ja: {
        desc: '新しいパスワードを入力してください。',
        newPw: '新しいパスワード',
        confirmPw: 'パスワード確認',
        hint: '8文字以上入力してください',
        submit: 'パスワードを変更',
        mismatch: 'パスワードが一致しません。',
        successTitle: 'パスワードが変更されました',
        successDesc: 'アプリに戻って新しいパスワードでログインしてください。',
        errorTitle: '無効なリンク',
        errorDesc: 'このリンクは無効または期限切れです。\nアプリから再度リクエストしてください。',
        fail: 'パスワードの変更に失敗しました。もう一度お試しください。',
        changing: '変更中...',
      },
      zh: {
        desc: '請輸入新密碼。',
        newPw: '新密碼',
        confirmPw: '確認密碼',
        hint: '請輸入至少8個字元',
        submit: '重設密碼',
        mismatch: '密碼不一致。',
        successTitle: '密碼已變更',
        successDesc: '請返回應用程式使用新密碼登入。',
        errorTitle: '連結無效',
        errorDesc: '此密碼重設連結無效或已過期。\n請從應用程式重新請求。',
        fail: '密碼變更失敗，請重試。',
        changing: '變更中...',
      },
      vi: {
        desc: 'Nhập mật khẩu mới của bạn.',
        newPw: 'Mật khẩu mới',
        confirmPw: 'Xác nhận mật khẩu',
        hint: 'Ít nhất 8 ký tự',
        submit: 'Đặt lại mật khẩu',
        mismatch: 'Mật khẩu không khớp.',
        successTitle: 'Đã đổi mật khẩu',
        successDesc: 'Quay lại ứng dụng và đăng nhập bằng mật khẩu mới.',
        errorTitle: 'Liên kết không hợp lệ',
        errorDesc: 'Liên kết đặt lại mật khẩu không hợp lệ hoặc đã hết hạn.\nVui lòng yêu cầu lại từ ứng dụng.',
        fail: 'Đổi mật khẩu thất bại. Vui lòng thử lại.',
        changing: 'Đang thay đổi...',
      },
      id: {
        desc: 'Masukkan kata sandi baru Anda.',
        newPw: 'Kata Sandi Baru',
        confirmPw: 'Konfirmasi Kata Sandi',
        hint: 'Minimal 8 karakter',
        submit: 'Atur Ulang Kata Sandi',
        mismatch: 'Kata sandi tidak cocok.',
        successTitle: 'Kata Sandi Diubah',
        successDesc: 'Kembali ke aplikasi dan masuk dengan kata sandi baru Anda.',
        errorTitle: 'Tautan Tidak Valid',
        errorDesc: 'Tautan reset kata sandi tidak valid atau sudah kedaluwarsa.\nSilakan minta ulang dari aplikasi.',
        fail: 'Gagal mengubah kata sandi. Silakan coba lagi.',
        changing: 'Mengubah...',
      },
    };
    const t = texts[lang] || texts.en;

    // 초기화
    function init() {
      if (!userId || !secret) {
        document.getElementById('formView').style.display = 'none';
        document.getElementById('errorView').style.display = 'block';
        document.getElementById('errorTitle').textContent = t.errorTitle;
        document.getElementById('errorDesc').textContent = t.errorDesc;
        return;
      }

      document.getElementById('description').textContent = t.desc;
      document.getElementById('labelNew').textContent = t.newPw;
      document.getElementById('labelConfirm').textContent = t.confirmPw;
      document.getElementById('hintText').textContent = t.hint;
      document.getElementById('submitBtn').textContent = t.submit;
      document.getElementById('successTitle').textContent = t.successTitle;
      document.getElementById('successDesc').textContent = t.successDesc;
      document.getElementById('errorTitle').textContent = t.errorTitle;
      document.getElementById('errorDesc').textContent = t.errorDesc;
    }

    async function handleSubmit(e) {
      e.preventDefault();
      const msgBox = document.getElementById('messageBox');
      const newPw = document.getElementById('newPassword').value;
      const confirmPw = document.getElementById('confirmPassword').value;

      msgBox.className = 'message';
      msgBox.style.display = 'none';

      if (newPw !== confirmPw) {
        msgBox.className = 'message error';
        msgBox.textContent = t.mismatch;
        return;
      }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = t.changing;

      try {
        const res = await fetch(`${APPWRITE_ENDPOINT}/account/recovery`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'X-Appwrite-Project': PROJECT_ID,
          },
          body: JSON.stringify({
            userId: userId,
            secret: secret,
            password: newPw,
          }),
        });

        if (res.ok) {
          document.getElementById('formView').style.display = 'none';
          document.getElementById('successView').style.display = 'block';
        } else {
          msgBox.className = 'message error';
          msgBox.textContent = t.fail;
          btn.disabled = false;
          btn.textContent = t.submit;
        }
      } catch (err) {
        msgBox.className = 'message error';
        msgBox.textContent = t.fail;
        btn.disabled = false;
        btn.textContent = t.submit;
      }
    }

    init();
  </script>
</body>
</html>
